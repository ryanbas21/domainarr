name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary: full build + typecheck + test
          - os: ubuntu-latest
            node: '22'
            full: true
          # OS compat: just test (build is platform-independent)
          - os: macos-latest
            node: '22'
            full: false
          - os: windows-latest
            node: '22'
            full: false
          # Node compat
          - os: ubuntu-latest
            node: '20'
            full: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        if: matrix.full
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test --run
