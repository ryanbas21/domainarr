name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, windows-latest]
        node: ['20', '22', '24']
        exclude:
          # Reduce matrix size: only test all Node versions on ubuntu-latest
          - os: ubuntu-22.04
            node: '20'
          - os: ubuntu-22.04
            node: '24'
          - os: macos-latest
            node: '20'
          - os: macos-latest
            node: '24'
          - os: windows-latest
            node: '20'
          - os: windows-latest
            node: '24'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test --run
